<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniMerch Inbox</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="tie-dye-bg"></div>
    
    <header class="header">
        <div class="logo">
            <span class="logo-icon">📬</span>
            <h1>miniMerch Inbox</h1>
        </div>
        <div class="header-decoration">
            <svg class="peace-sign" viewBox="0 0 100 100" width="40" height="40">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#FFD700" stroke-width="4"/>
                <line x1="50" y1="5" x2="50" y2="50" stroke="#FFD700" stroke-width="4"/>
                <line x1="50" y1="50" x2="85" y2="75" stroke="#FFD700" stroke-width="4"/>
                <line x1="50" y1="50" x2="15" y2="75" stroke="#FFD700" stroke-width="4"/>
                <circle cx="50" cy="50" r="20" fill="#FFD700"/>
                <circle cx="50" cy="50" r="12" fill="#2D5016"/>
            </svg>
        </div>
    </header>

    <main class="main-content">
        <div class="inbox-container">
            <div class="inbox-tabs">
                <button class="inbox-tab active" data-view="inbox">
                    📥 Inbox <span class="badge" id="unread-count">0</span>
                </button>
                <button class="inbox-tab" data-view="all">
                    📋 All <span class="badge secondary" id="total-count">0</span>
                </button>
                <button class="inbox-tab" data-view="sent" id="sent-tab">
                    📤 Sent <span class="badge secondary" id="sent-count">0</span>
                </button>
            </div>
            
            <div class="inbox-toolbar">
                <div class="export-actions">
                    <button class="export-btn json-btn" id="export-json-btn" title="Export as JSON">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        JSON
                    </button>
                    <button class="export-btn csv-btn" id="export-csv-btn" title="Export as CSV">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        CSV
                    </button>
                </div>
                <div class="filter-actions">
                    <select id="status-filter" class="status-filter">
                        <option value="">All Status</option>
                        <option value="PENDING">⏳ Pending</option>
                        <option value="PAID">💳 Paid</option>
                        <option value="CONFIRMED">✅ Confirmed</option>
                        <option value="SHIPPED">🚚 Shipped</option>
                        <option value="DELIVERED">📦 Delivered</option>
                    </select>
                </div>
            </div>

            <div class="inbox-list" id="inbox-list">
                <div class="empty-inbox">
                    <div class="empty-icon">📭</div>
                    <p>No orders yet</p>
                    <p class="empty-hint">Orders from your shops will appear here</p>
                    <button class="refresh-btn" id="refresh-btn">🔄 Check for Orders</button>
                </div>
            </div>
        </div>
    </main>

    <div id="message-modal" class="modal hidden">
        <div class="modal-content message-detail">
            <button class="modal-close">&times;</button>
            
            <div class="message-header">
                <h2 id="modal-title">Order Details</h2>
                <span class="message-direction" id="modal-direction">📥</span>
            </div>
            
            <div class="message-info" id="modal-info">
            </div>
            
            <div class="message-actions">
                <button class="action-btn" id="copy-address-btn">📋 Copy Delivery Address</button>
                <button class="action-btn secondary" id="mark-read-btn">✓ Mark as Read</button>
            </div>

            <div class="status-section" id="status-section">
                <label>Order Status:</label>
                <select id="status-selector" class="status-selector">
                    <option value="PENDING">⏳ Pending</option>
                    <option value="PAID">💳 Paid</option>
                    <option value="CONFIRMED">✅ Confirmed</option>
                    <option value="SHIPPED">🚚 Shipped</option>
                    <option value="DELIVERED">📦 Delivered</option>
                </select>
                <button class="action-btn" id="update-status-btn">Update Status</button>
            </div>
            <div class="reply-action" id="reply-action" style="display: none;">
                <button class="action-btn reply-btn" id="reply-btn">↩️ Reply to Buyer</button>
                <p class="reply-warning" id="reply-warning" style="display: none; color: #c62828; font-size: 0.8rem; margin-top: 0.5rem;">⚠️ Buyer contact info missing - cannot reply</p>
            </div>
            
            <div class="message-tx">
                <span class="tx-label">TX ID:</span>
                <div class="tx-copy-row">
                    <span class="tx-id" id="modal-txid">-</span>
                    <button class="copy-btn" id="copy-txid-btn" title="Copy transaction ID"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="reply-modal" class="modal hidden">
        <div class="modal-content reply-modal-content">
            <button class="modal-close" id="reply-modal-close">&times;</button>
            
            <div class="message-header">
                <h2>Reply to Buyer</h2>
                <span class="message-direction" id="reply-to-address">-</span>
            </div>
            
            <div class="reply-form">
                <p class="reply-order-ref">Order: <span id="reply-order-ref">-</span></p>
                <textarea id="reply-message" placeholder="Type your reply message..." rows="6"></textarea>
                <div class="reply-status" id="reply-status"></div>
            </div>
            
            <div class="message-actions">
                <button class="action-btn" id="send-reply-btn">📤 Send Reply</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Powered by <span class="minima-text">Minima</span> Blockchain</p>
        <p class="bridge-link">Bridge USDT to Minima: <a href="https://mxusd.global" target="_blank" rel="noopener">mxusd.global</a></p>
    </footer>

    <script src="config.js"></script>
    <script src="mds.js"></script>
    <script src="app.js"></script>
</body>
</html>
